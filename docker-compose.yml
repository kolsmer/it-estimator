services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: estimator
      POSTGRES_USER: estimator
      POSTGRES_PASSWORD: estimator
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U estimator -d estimator']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      PYTHONPYCACHEPREFIX: /tmp/pycache
    ports:
      - '8000:8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "rm -rf .next && npm install && npm run dev -- -H 0.0.0.0"
    env_file:
      - .env
    ports:
      - '3000:3000'
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  postgres_data:
